<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise for Ammara</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&family=Great+Vibes&family=Kaushan+Script&display=swap');

body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fff0e6);
    overflow: hidden;
    color: #333;
}

/* Smooth page transition */
.container {
    width: 100%;
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    transition: opacity 0.6s ease, transform 0.6s ease;
    opacity: 0;
    transform: scale(0.98);
}
.active { 
    display: flex !important; 
    opacity: 1;
    transform: scale(1);
}

h1 { margin: 10px 0; }

/* Smooth premium buttons */
button {
    padding: 12px 28px;
    font-size: 1.2rem;
    cursor: pointer;
    border: none;
    border-radius: 14px;
    background: linear-gradient(45deg, #ff6b81, #ff9ff3);
    color: white;
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 8px 20px rgba(255, 107, 129, 0.3);
}
button:hover {
    transform: translateY(-4px) scale(1.08);
    box-shadow: 0 12px 25px rgba(255, 107, 129, 0.5);
}
button:active {
    transform: scale(0.95);
}

/* Smooth floating hearts & flowers */
.floating {
    position: absolute;
    z-index: 0;
    animation: smoothFloat 12s ease-in-out infinite;
    opacity: 0.85;
    pointer-events: none;
}
@keyframes smoothFloat {
    0% { transform: translateY(0px) rotate(0deg) scale(1); }
    25% { transform: translateY(-25px) rotate(90deg) scale(1.05); }
    50% { transform: translateY(-45px) rotate(180deg) scale(1); }
    75% { transform: translateY(-25px) rotate(270deg) scale(1.05); }
    100% { transform: translateY(0px) rotate(360deg) scale(1); }
}

/* Fade text */
.fade { animation: fadeIn 1s ease forwards; opacity: 0; }
@keyframes fadeIn { to { opacity: 1; } }

/* Popup animation upgraded */
.answer-popup {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ff6b81;
    color: white;
    padding: 12px 25px;
    border-radius: 12px;
    display: none;
    font-family: 'Roboto', sans-serif;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    animation: popupFade 0.4s ease forwards;
}
@keyframes popupFade { 
    from {opacity:0; transform:translate(-50%,-40%) scale(0.8);} 
    to {opacity:1; transform:translate(-50%,-50%) scale(1);} 
}

.landing h1 { font-family: 'Pacifico', cursive; font-size: 4rem; color: #ff4757; }
.landing h2 { font-family: 'Kaushan Script', cursive; font-size: 2.5rem; color: #ff6b81; }
.memory p { font-family: 'Great Vibes', cursive; font-size: 1.6rem; line-height: 2.2rem; color: #2f3542; margin: 10px 0; }
.question h2 { font-size: 1.8rem; margin-bottom: 20px; }
.question button { margin: 5px; }

.final h2 { font-family: 'Pacifico', cursive; font-size: 2rem; margin: 10px 0; color:#ff4757; }
.final p { font-size: 1.3rem; line-height: 2rem; color:#2f3542; }

.centered { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }

/* Click heart animation */
@keyframes heartPop {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity:1; }
    100% { transform: translate(-50%, -120px) scale(1.5); opacity:0; }
}
</style>
</head>
<body>

<!-- Landing Page -->
<div class="container landing active" id="page1">
    <div class="centered fade">
        <h1>Happy Birthday</h1>
        <h2>Ammara</h2>
        <h3>6th March</h3>
        <button onclick="nextPage(2)">Open Surprise 🎉</button>
    </div>
    <img src="https://i.postimg.cc/MTgB9rgH/heart.png" class="floating" style="top:10%; left:15%; width:40px;">
    <img src="https://i.postimg.cc/9f8KXQ0V/flower.png" class="floating" style="top:20%; left:70%; width:50px;">
    <img src="https://i.postimg.cc/MTgB9rgH/heart.png" class="floating" style="top:75%; left:30%; width:35px;">
</div>

<script>
document.addEventListener("click", function(e) {
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "fixed";
    heart.style.left = e.clientX + "px";
    heart.style.top = e.clientY + "px";
    heart.style.fontSize = "18px";
    heart.style.pointerEvents = "none";
    heart.style.animation = "heartPop 1s ease forwards";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 1000);
});
</script>

<script>
/* Navigation remains SAME */
function nextPage(n) {
    document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    document.getElementById('page'+n).classList.add('active');
    if(n===3) startMemory();
    if(n===5) startQuestion();
}

/* QUESTIONS UPDATED ONLY WHERE AGREED */
const questions = [
{q:"What lights up my dark night?", o:["Sun","Moon"], a:"Your presence"},
{q:"If happiness were a place, where would it be?", o:["Beach","Mountains"], a:"Next to you"},
{q:"If love had a flavor, which would it taste like?", o:["Sweet","Bitter"], a:"Just like you"},
{q:"If I try to ignore you, what happens next?", o:["You let me go","You chase me"], a:"You chase me"},
{q:"If the strongest magic existed, which one would win?", o:["Black magic","Ancient spells"], a:"Your eyes"},
{q:"If loving you was a crime, then I am...", o:["Innocent","Criminal"], a:"Boss, I am the biggest criminal 😌"}
];
</script>

</body>
</html>
